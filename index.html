<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>۴۰۵ چت پرو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .app-container { width: 100%; max-width: 480px; height: 100vh; background-color: #1e293b; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 10; background: #0f172a; padding: 30px; justify-content: center; align-items: center; }
        .screen.active { display: flex; }
        .login-logo { font-size: 60px; color: #38bdf8; margin-bottom: 20px; animation: bounce 2s infinite; }
        .login-input { width: 100%; padding: 14px; background: #1e293b; border: 2px solid #334155; border-radius: 12px; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; outline: none; }
        .login-input:focus { border-color: #38bdf8; }
        .avatar-select { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; cursor: pointer; }
        .avatar-preview { width: 90px; height: 90px; border-radius: 50%; background: #334155; display: flex; justify-content: center; align-items: center; font-size: 32px; overflow: hidden; border: 3px solid #38bdf8; }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn-main { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .header { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; position: relative; }
        .contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-item { display: flex; align-items: center; padding: 12px; background: #1e293b; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid #334155; }
        .contact-item:hover { background: #334155; }
        .c-avatar { width: 45px; height: 45px; border-radius: 50%; background: #475569; margin-left: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; overflow: hidden; color: white; }
        .c-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .add-contact-bar { padding: 15px; background: #0f172a; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #334155; }
        .add-contact-row { display: flex; gap: 8px; }
        .settings-menu { position: absolute; top: 65px; left: 15px; background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; display: none; flex-direction: column; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; width: 160px; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; text-align: center; font-size: 13px; }
        .chat-screen { background-image: url('https://images.unsplash.com/photo-1617814076367-b759c7d7e738?q=80&w=600'); background-size: cover; background-position: center; position: relative; }
        .chat-overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(15, 23, 42, 0.78); display: flex; flex-direction: column; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .message.sent { background: #2563eb; color: white; align-self: flex-end; border-bottom-left-radius: 2px; }
        .message.received { background: #334155; color: white; align-self: flex-start; border-bottom-right-radius: 2px; }
        .message img, .message video { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        audio { max-width: 100%; margin-top: 5px; }
        .input-area { background: #1e293b; padding: 12px; display: flex; gap: 8px; align-items: center; }
        .input-area input { flex: 1; background: #0f172a; border: none; padding: 12px 16px; border-radius: 25px; color: white; outline: none; }
        .btn-icon { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
        .btn-icon:hover { background: rgba(255,255,255,0.05); color: white; }
        .btn-send { background: #38bdf8; color: #0f172a; }
        .call-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 200; flex-direction: column; justify-content: space-between; padding: 40px; align-items: center; }
        .call-profile { text-align: center; margin-top: 40px; }
        .call-avatar { width: 120px; height: 120px; border-radius: 50%; background: #334155; margin-bottom: 15px; border: 4px solid #38bdf8; display: flex; justify-content: center; align-items: center; font-size: 50px; overflow: hidden; }
        .call-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .video-preview { width: 100%; height: 60%; background: #1e293b; border-radius: 20px; display: none; margin-top: 20px; border: 2px solid #38bdf8; position: relative; overflow: hidden; video { width: 100%; height: 100%; object-fit: cover; } }
        .call-actions { display: flex; gap: 30px; margin-bottom: 30px; }
        .btn-call { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 22px; cursor: pointer; color: white; }
        .btn-hangup { background: #ef4444; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .recording { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="screen" id="loginScreen">
            <div class="login-logo"><i class="fa-solid fa-car"></i></div>
            <h2 style="margin-bottom: 10px;">خوش آمدید به ۴۰۵ چت</h2>
            <div class="avatar-select" onclick="document.getElementById('profileImgInput').click()">
                <div class="avatar-preview" id="avatarPreview"><i class="fa-solid fa-user"></i></div>
                <span style="font-size: 12px; color: #38bdf8; margin-top: 8px;">انتخاب عکس پروفایل</span>
            </div>
            <input type="file" id="profileImgInput" accept="image/*" style="display:none" onchange="previewProfileImg(event)">
            <input type="text" class="login-input" id="loginUsername" placeholder="نام کاربری (آیدی) دلخواه...">
            <input type="text" class="login-input" id="loginPhone" placeholder="شماره موبایل...">
            <button class="btn-main" onclick="handleLogin()">ثبت نام و ورود دائم</button>
        </div>
        <div class="screen" id="contactsScreen">
            <div class="header" style="width: 100%;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="c-avatar" id="myProfileAvatar" style="width:35px; height:35px; margin:0;"></div>
                    <h3 id="myDisplayHeader">مخاطبین</h3>
                </div>
                <button class="btn-icon" onclick="toggleSettingsMenu()" style="color:white;"><i class="fa-solid fa-bars"></i></button>
                <div class="settings-menu" id="settingsMenu">
                    <button class="btn-logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> خروج از حساب</button>
                </div>
            </div>
            <div class="add-contact-bar">
                <input type="text" class="login-input" id="newContactName" placeholder="نام مخاطب" style="margin:0; padding:8px;">
                <div class="add-contact-row">
                    <input type="text" class="login-input" id="newContactSearch" placeholder="شماره یا آیدی..." style="margin:0; padding:8px;">
                    <button class="btn-main" onclick="addContact()" style="width:auto; padding:8px 15px;">افزودن</button>
                </div>
            </div>
            <div class="contact-list" id="contactListContainer">
                <div class="contact-item" onclick="openChat('پشتیبانی چت', '')">
                    <div class="c-avatar" style="background:#00a884">P</div>
                    <div>
                        <h4>پشتیبانی ۴۰۵ چت</h4>
                        <small style="color: #10b981;">سیستم ارتباط امن</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="screen chat-screen" id="chatScreen" style="padding:0;">
            <div class="chat-overlay">
                <div class="header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button class="btn-icon" onclick="backToContacts()" style="color:white;"><i class="fa-solid fa-arrow-right"></i></button>
                        <div class="c-avatar" id="chatUserAvatar" style="width:35px; height:35px; margin:0;"></div>
                        <h4 id="chatTitle">نام مخاطب</h4>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-icon" onclick="startCall('voice')" style="color:white;"><i class="fa-solid fa-phone"></i></button>
                        <button class="btn-icon" onclick="startCall('video')" style="color:white;"><i class="fa-solid fa-video"></i></button>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="input-area">
                    <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none" onchange="sendMedia(event)">
                    <button class="btn-icon" onclick="document.getElementById('mediaInput').click()"><i class="fa-solid fa-paperclip"></i></button>
                    <button class="btn-icon" id="micBtn" onclick="toggleVoice()"><i class="fa-solid fa-microphone"></i></button>
                    <input type="text" id="msgInput" placeholder="پیام خود را بنویسید..." onkeypress="if(event.key==='Enter') sendText()">
                    <button class="btn-icon btn-send" onclick="sendText()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <div class="call-screen" id="callScreen">
            <div class="call-profile" id="callProfileInfo">
                <div class="call-avatar" id="callAvatarContainer"></div>
                <h2 id="callName">نام مخاطب</h2>
                <p style="color: #38bdf8; margin-top: 10px;">در حال تماس...</p>
            </div>
            <div class="video-preview" id="videoPreviewBox"><video id="localVideo" autoplay playsinline muted></video></div>
            <div class="call-actions"><button class="btn-call btn-hangup" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button></div>
        </div>
    </div>
    <script>
        let myUser = { username: '', phone: '', avatar: '' };
        let activeChatUser = ''; let mediaRecorder; let audioChunks = []; let isRecording = false; let localStream;
        window.onload = function() {
            const savedUser = localStorage.getItem('405_chat_user');
            if (savedUser) { myUser = JSON.parse(savedUser); loadAppDashboard(); }
            else { document.getElementById('loginScreen').classList.add('active'); }
        };
        function previewProfileImg(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) { myUser.avatar = event.target.result; document.getElementById('avatarPreview').innerHTML = `<img src="${myUser.avatar}">`; };
                reader.readAsDataURL(file);
            }
        }
        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const phone = document.getElementById('loginPhone').value.trim();
            if(!username || !phone) { alert('نام کاربری و شماره تلفن را وارد کنید.'); return; }
            myUser.username = username; myUser.phone = phone;
            localStorage.setItem('405_chat_user', JSON.stringify(myUser));
            document.getElementById('loginScreen').classList.remove('active');
            loadAppDashboard();
        }
        function loadAppDashboard() {
            document.getElementById('myProfileAvatar').innerHTML = myUser.avatar ? `<img src="${myUser.avatar}">` : myUser.username[0].toUpperCase();
            document.getElementById('myDisplayHeader').textContent = myUser.username;
            document.getElementById('contactsScreen').classList.add('active');
        }
        function toggleSettingsMenu() { const menu = document.getElementById('settingsMenu'); menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex'; }
        function handleLogout() {
            if(confirm('آیا می‌خواهید از حساب خارج شوید؟')) {
                localStorage.removeItem('405_chat_user');
                document.getElementById('settingsMenu').style.display = 'none';
                document.getElementById('contactsScreen').classList.remove('active');
                document.getElementById('chatScreen').classList.remove('active');
                document.getElementById('loginScreen').classList.add('active');
            }
        }
        function addContact() {
            const name = document.getElementById('newContactName').value.trim();
            const searchValue = document.getElementById('newContactSearch').value.trim();
            if(!name || !searchValue) { alert('اطلاعات را کامل کنید'); return; }
            const container = document.getElementById('contactListContainer');
            const item = document.createElement('div');
            item.className = 'contact-item';
            item.onclick = () => openChat(name, '');
            item.innerHTML = `<div class="c-avatar" style="background:#475569">${name[0].toUpperCase()}</div><div><h4>${name}</h4><small style="color: #94a3b8;">شناسه: ${searchValue}</small></div>`;
            container.appendChild(item);
            document.getElementById('newContactName').value = ''; document.getElementById('newContactSearch').value = '';
        }
        function openChat(name, avatar) {
            activeChatUser = name;
            document.getElementById('chatTitle').textContent = name;
            document.getElementById('chatUserAvatar').innerHTML = avatar ? `<img src="${avatar}">` : name[0].toUpperCase();
            document.getElementById('chatMessages').innerHTML = ''; 
            document.getElementById('contactsScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');
        }
        function backToContacts() { document.getElementById('chatScreen').classList.remove('active'); document.getElementById('contactsScreen').classList.add('active'); }
        function sendText() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            appendMessage(input.value.trim(), 'sent');
            input.value = '';
        }
        function sendMedia(e) {
            const file = e.target.files[0]; if(!file) return;
            appendMessage(URL.createObjectURL(file), 'sent', file.type.startsWith('image/') ? 'img' : 'video');
        }
        async function toggleVoice() {
            const btn = document.getElementById('micBtn');
            if(!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => { appendMessage(URL.createObjectURL(new Blob(audioChunks, { type: 'audio/mp3' })), 'sent', 'audio'); };
                mediaRecorder.start(); isRecording = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i>'; btn.classList.add('recording');
            } else { mediaRecorder.stop(); isRecording = false; btn.innerHTML = '<i class="fa-solid fa-microphone"></i>'; btn.classList.remove('recording'); }
        }
        function appendMessage(content, type, mediaType = 'text') {
            const container = document.getElementById('chatMessages'); const msg = document.createElement('div'); msg.className = `message ${type}`;
            if(mediaType === 'text') msg.textContent = content;
            else if(mediaType === 'img') msg.innerHTML = `<img src="${content}">`;
            else if(mediaType === 'video') msg.innerHTML = `<video src="${content}" controls></video>`;
            else if(mediaType === 'audio') msg.innerHTML = `<audio src="${content}" controls></audio>`;
            container.appendChild(msg); container.scrollTop = container.scrollHeight;
        }
        async function startCall(type) {
            document.getElementById('callName').textContent = activeChatUser; document.getElementById('callAvatarContainer').innerHTML = activeChatUser[0].toUpperCase();
            document.getElementById('callScreen').style.display = 'flex';
            if(type === 'video') {
                document.getElementById('videoPreviewBox').style.display = 'block'; document.getElementById('callProfileInfo').style.display = 'none';
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); document.getElementById('localVideo').srcObject = localStream;
            }
        }
        function endCall() { if(localStream) localStream.getTracks().forEach(t => t.stop()); document.getElementById('callScreen').style.display = 'none'; }
    </script>
</body>
</html>
